name: Wedding Countdown Email

on:
  schedule:
    - cron: '31 2 * * *'
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-dotenv

      - name: Check secrets are loaded
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: |
          python -c "import os; p=os.environ.get('GMAIL_PASSWORD','NOT FOUND'); print(f'Password length: {len(p)}'); print(f'FROM: {os.environ.get(\"FROM_EMAIL\",\"NOT FOUND\")}')"

      - name: Send countdown email
        env:
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          TO_EMAIL: ${{ secrets.TO_EMAIL }}
        run: python send_email.py
